version: 2
jobs:
  build:
    docker:
      - image: cimg/node:22

    working_directory: ~/client

    steps:
      - checkout
      - run: corepack enable && corepack prepare pnpm@latest --activate
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-
      - run: pnpm install --frozen-lockfile
      - save_cache:
          paths:
            - node_modules
            - ~/.local/share/pnpm/store
          key: pnpm-v1-{{ checksum "pnpm-lock.yaml" }}
      - run: pnpm test

  deploy:
    machine:
      enabled: true

    working_directory: ~/client

    steps:
      - add_ssh_keys:
          fingerprints:
            - "e9:01:df:c5:5e:dd:70:96:6f:fc:dd:e9:e4:c1:6b:83"
      - checkout
      - run:
          name: Push Master to Production
          command: |
            git push https://github.com/DenysPyshniuk/scheduler.git master:production

workflows:
  version: 2
  test_and_deploy:
    jobs:
      - build:
          filters:
            branches:
              ignore: production
      - deploy:
          filters:
            branches:
              ignore: production
          requires:
            - build
